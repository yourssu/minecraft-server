key-file-name: key.pem

username-prefix: "."
replace-spaces: true

default-locale: en_US

disconnect:
  invalid-key: "Please connect through the official Geyser or use a valid Floodgate key."
  invalid-arguments-length: "Expected {0} arguments, got {1}."

player-link:
  enabled: false
  require-link: false
  allow-linking: false
  link-code-timeout: 300
  type: disabled
  enable-own-linking: false

allowed-proxy-ips: []

metrics:
  enabled: true
  uuid: generateduuid

debug: false
config-version: 3
