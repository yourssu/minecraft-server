services:
  paper:
    image: itzg/minecraft-server:java21
    container_name: minecraft-paper
    labels:
      mcsmanager.instance.uuid: "b8f87fdb491e44cb82804de762d8800a"
    init: true
    stdin_open: true
    tty: true
    restart: unless-stopped
    stop_grace_period: 2m
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - "${MC_PORT:-25565}:25565/tcp"
      - "${BEDROCK_PORT:-19132}:19132/udp"
      - "127.0.0.1:8100:8100"
    environment:
      EULA: "TRUE"
      TZ: "${TZ:-Asia/Seoul}"
      VERSION: "1.21.11"
      TYPE: "PAPER"
      MEMORY: "${MC_MEMORY:-6G}"
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      MOTD: "${MOTD:-Paper 1.21.11 on Java 21}"
      LEVEL: "${MC_LEVEL:-world}"
      MODE: "${MC_MODE:-survival}"
      DIFFICULTY: "${MC_DIFFICULTY:-normal}"
      MAX_PLAYERS: "${MAX_PLAYERS:-50}"
      VIEW_DISTANCE: "${VIEW_DISTANCE:-10}"
      SIMULATION_DISTANCE: "${SIMULATION_DISTANCE:-10}"
      ONLINE_MODE: "${ONLINE_MODE:-TRUE}"
      ENABLE_WHITELIST: "${ENABLE_WHITELIST:-FALSE}"
      ENFORCE_WHITELIST: "${ENFORCE_WHITELIST:-FALSE}"
      WHITELIST: "${WHITELIST:-}"
      OPS: "${OPS:-}"
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: "${RCON_PASSWORD:-change-this-now}"
      RCON_CMDS_STARTUP: |-
        papi reload
        displaytags reload
      ENABLE_QUERY: "${ENABLE_QUERY:-FALSE}"
      PVP: "${PVP:-TRUE}"
      ALLOW_FLIGHT: "${ALLOW_FLIGHT:-FALSE}"
      ENABLE_COMMAND_BLOCK: "${ENABLE_COMMAND_BLOCK:-FALSE}"
      SNOOPER_ENABLED: "FALSE"
      USE_AIKAR_FLAGS: "${USE_AIKAR_FLAGS:-TRUE}"
      JVM_OPTS: "-Xbootclasspath/a:/extras/rhino-runtime.jar"
      MODRINTH_PROJECTS: "@/extras/paper-modrinth-plugins.txt"
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
      MODRINTH_DOWNLOAD_DEPENDENCIES: "${MODRINTH_DOWNLOAD_DEPENDENCIES:-required}"
      COPY_CONFIG_DEST: "/data"
      SYNC_SKIP_NEWER_IN_DESTINATION: "false"
      SPIGET_RESOURCES: "${SPIGET_RESOURCES:-34315,90766}"
      ENABLE_AUTOPAUSE: "${ENABLE_AUTOPAUSE:-FALSE}"
      AUTOPAUSE_TIMEOUT_EST: "${AUTOPAUSE_TIMEOUT_EST:-3600}"
      EXISTING_OPS_FILE: "MERGE"
      EXISTING_WHITELIST_FILE: "MERGE"
    volumes:
      - ./data:/data
      - ./paper-plugins:/plugins
      - ./config:/config:ro
      - ./extras:/extras:ro
    networks:
      - default
      - mc-proxy
    healthcheck:
      test: ["CMD", "mc-health", "--mcping"]
      start_period: 5m
      interval: 30s
      timeout: 10s
      retries: 5

  mcsmanager-web:
    image: githubyumao/mcsmanager-web:latest
    container_name: mcsmanager-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:23333:23333"
    volumes:
      - ./mcsmanager-data/web:/opt/mcsmanager/web/data
    environment:
      TZ: "${TZ:-Asia/Seoul}"
    networks:
      - default
      - mc-proxy
    depends_on:
      - mcsmanager-daemon

  mcsmanager-daemon:
    image: githubyumao/mcsmanager-daemon:latest
    container_name: mcsmanager-daemon
    restart: unless-stopped
    volumes:
      - ./mcsmanager-data/daemon:/opt/mcsmanager/daemon/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: "${TZ:-Asia/Seoul}"
    networks:
      - default
      - mc-proxy

  backups:
    image: itzg/mc-backup:latest
    container_name: minecraft-backups
    init: true
    restart: unless-stopped
    depends_on:
      paper:
        condition: service_healthy
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Asia/Seoul}"
      BACKUP_NAME: "${BACKUP_NAME:-world}"
      BACKUP_METHOD: "${BACKUP_METHOD:-tar}"
      BACKUP_INTERVAL: "${BACKUP_INTERVAL:-12h}"
      INITIAL_DELAY: "0"
      PRUNE_BACKUPS_DAYS: "${PRUNE_BACKUPS_DAYS:-7}"
      PAUSE_IF_NO_PLAYERS: "${PAUSE_IF_NO_PLAYERS:-FALSE}"
      RCON_HOST: paper
      RCON_PORT: 25575
      RCON_PASSWORD: "${RCON_PASSWORD:-change-this-now}"
      LINK_LATEST: "TRUE"
      TAR_COMPRESS_METHOD: "zstd"
    volumes:
      - ./data:/data:ro
      - ./backups:/backups

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "24444:24444"
    volumes:
      - ./deploy/nginx/minecraft.yourssu.com.conf:/etc/nginx/conf.d/minecraft.conf:ro
      - ./deploy/nginx/index.html:/usr/share/nginx/html/index.html:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    networks:
      - mc-proxy
    depends_on:
      paper:
        condition: service_healthy
      mcsmanager-web:
        condition: service_started
      mcsmanager-daemon:
        condition: service_started

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: []
    command: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

  certbot-init:
    image: certbot/certbot
    profiles:
      - certbot
    environment:
      LETSENCRYPT_DOMAIN: "${LETSENCRYPT_DOMAIN:-minecraft.yourssu.com}"
      LETSENCRYPT_EMAIL: "${LETSENCRYPT_EMAIL:-}"
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: []
    command: >-
      /bin/sh -c '
        set -eu;
        domain="$${LETSENCRYPT_DOMAIN:-minecraft.yourssu.com}";
        email="$${LETSENCRYPT_EMAIL:-}";
        if [ -n "$$email" ]; then
          email_args="--email $$email";
        else
          email_args="--register-unsafely-without-email";
        fi;
        certbot certonly --webroot --webroot-path /var/www/certbot --non-interactive --agree-tos --no-eff-email $$email_args -d "$$domain"
      '

networks:
  mc-proxy:
    external: true